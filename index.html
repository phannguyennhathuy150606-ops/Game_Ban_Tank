<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tank Infinite: Power-ups & AI Log Update</title>
    <style>
        body { background: #0a0a0a; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .stat { 
            background: rgba(15, 76, 117, 0.9); 
            padding: 12px 20px; 
            margin-bottom: 8px; 
            border-radius: 8px; 
            border-left: 6px solid #3282b8; 
            font-weight: bold;
            min-width: 180px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .label { color: #bdc3c7; font-size: 14px; margin-bottom: 2px; display: block; }
        .value { font-size: 22px; display: block; }
        canvas { display: block; background: #1b262c; }
        #gameOver { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 5px; }
        #levelNotify { 
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); 
            color: #f1c40f; font-size: 70px; font-weight: 900; display: none; 
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.8); z-index: 50;
            animation: pulse 0.5s infinite alternate;
        }

        /* --- UI CHO LOG AI MỚI --- */
        #ai-log-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 260px;
            max-height: 400px;
            background: rgba(15, 76, 117, 0.85);
            border: 2px solid #3282b8;
            border-radius: 10px;
            color: #00d4ff;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            padding: 12px;
            overflow-y: hidden;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .log-entry { margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .log-title { color: #f1c40f; font-weight: bold; display: block; margin-bottom: 8px; text-align: center; border-bottom: 2px solid #f1c40f; padding-bottom: 4px; }
        
        #buffs { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .buff-icon { padding: 8px 15px; border-radius: 5px; font-size: 14px; font-weight: bold; display: none; animation: pulse 0.3s infinite alternate; }
        @keyframes pulse { from { scale: 1; } to { scale: 1.05; } }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat" style="border-left-color: #f1c40f;">
            <span class="label">CẤP ĐỘ / LEVEL</span>
            <span id="lvl" class="value" style="color:#f1c40f">1</span>
        </div>
        <div class="stat" style="border-left-color: #ff7675;">
            <span class="label">MÁU / HP</span>
            <span id="hp" class="value" style="color:#ff7675">5</span>
        </div>
        <div class="stat" style="border-left-color: #3498db;">
            <span class="label">ĐIỂM / SCORE</span>
            <span id="score" class="value">0</span>
        </div>
        <div class="stat" style="border-left-color: #2ecc71; min-width: 120px; padding: 5px 20px;">
            <span class="label" style="font-size: 11px;">MỤC TIÊU TIẾP: <span id="nextLvl" style="color:#2ecc71">50</span></span>
        </div>
    </div>

    <div id="ai-log-panel">
        <span class="log-title">AI BRAIN TELEMETRY</span>
        <div id="log-content">Initializing Neural Links...</div>
    </div>

    <div id="buffs">
        <div id="buff-triple" class="buff-icon" style="background: #f1c40f; color: black;">TRIPLE SHOT</div>
        <div id="buff-speed" class="buff-icon" style="background: #2ecc71; color: black;">SPEED BOOST</div>
    </div>

    <div id="levelNotify">LEVEL UP!</div>

    <div id="gameOver">
        <h1>GAME OVER</h1>
        <button onclick="location.reload()">RESTART</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GRID_SIZE = 60;
        let screenW = window.innerWidth;
        let screenH = window.innerHeight;
        canvas.width = screenW;
        canvas.height = screenH;

        let mouse = { x: 0, y: 0 };
        const keys = {};
        let score = 0, level = 1, nextLevelScore = 50, isRunning = true;
        
        let bullets = [], enemies = [], walls = new Map(), powerUps = [];
        let camera = { x: 0, y: 0 };

        const getWallKey = (gx, gy) => `${gx},${gy}`;

        function generateWallsAround(centerX, centerY, radius = 25) {
            const gx = Math.floor(centerX / GRID_SIZE);
            const gy = Math.floor(centerY / GRID_SIZE);
            for(let x = gx - radius; x < gx + radius; x++) {
                for(let y = gy - radius; y < gy + radius; y++) {
                    const key = getWallKey(x, y);
                    if (!walls.has(key)) {
                        const dist = Math.hypot(x, y);
                        if (Math.random() < 0.02 && dist > 6) {
                            walls.set(key, { x: x * GRID_SIZE, y: y * GRID_SIZE });
                        } else {
                            walls.set(key, null);
                        }
                    }
                }
            }
        }

        class PowerUp {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const r = Math.random();
                if (r < 0.33) this.type = 'triple';
                else if (r < 0.66) this.type = 'hp';
                else this.type = 'speed';
                this.active = true;
                this.timer = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x - camera.x, this.y - camera.y);
                this.timer += 0.1;
                ctx.scale(1 + Math.sin(this.timer)*0.1, 1 + Math.sin(this.timer)*0.1);
                ctx.beginPath();
                ctx.arc(0, 0, 20, 0, Math.PI * 2);
                ctx.fillStyle = this.type === 'triple' ? '#f1c40f' : (this.type === 'hp' ? '#ff7675' : '#2ecc71');
                ctx.globalAlpha = 0.6;
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "bold 16px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                let icon = this.type === 'triple' ? "III" : (this.type === 'hp' ? "+" : ">>");
                ctx.fillText(icon, 0, 0);
                ctx.restore();
                ctx.globalAlpha = 1.0;
            }
        }

        function checkLevelUp() {
            if (score >= nextLevelScore) {
                level++;
                nextLevelScore *= 2;
                const notify = document.getElementById('levelNotify');
                notify.style.display = 'block';
                setTimeout(() => notify.style.display = 'none', 2000);
                document.getElementById('lvl').innerText = level;
                document.getElementById('nextLvl').innerText = nextLevelScore;
                if(player.hp < 10) player.hp++;
                document.getElementById('hp').innerText = player.hp;
            }
        }

        function getPath(start, target) {
            const sNode = { x: Math.floor(start.x / GRID_SIZE), y: Math.floor(start.y / GRID_SIZE) };
            const tNode = { x: Math.floor(target.x / GRID_SIZE), y: Math.floor(target.y / GRID_SIZE) };
            let openSet = [{ ...sNode, g: 0, f: 0, parent: null }];
            let closedSet = new Set();
            let attempts = 0;
            while (openSet.length > 0 && attempts < 100) {
                attempts++;
                let curr = openSet.reduce((p, c) => (p.f < c.f ? p : c));
                if (curr.x === tNode.x && curr.y === tNode.y) {
                    let path = [];
                    while (curr) {
                        path.push({ x: curr.x * GRID_SIZE + GRID_SIZE/2, y: curr.y * GRID_SIZE + GRID_SIZE/2 });
                        curr = curr.parent;
                    }
                    return path.reverse();
                }
                openSet = openSet.filter(n => n !== curr);
                closedSet.add(`${curr.x},${curr.y}`);
                [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}].forEach(offset => {
                    let nb = { x: curr.x + offset.x, y: curr.y + offset.y };
                    if (closedSet.has(`${nb.x},${nb.y}`) || walls.get(getWallKey(nb.x, nb.y))) return;
                    let g = curr.g + 1;
                    let existing = openSet.find(n => n.x === nb.x && n.y === nb.y);
                    if (!existing || g < existing.g) {
                        let node = { ...nb, g, f: g + Math.abs(nb.x-tNode.x) + Math.abs(nb.y-tNode.y), parent: curr };
                        if (!existing) openSet.push(node);
                    }
                });
            }
            return [];
        }

        class Tank {
            constructor(x, y, color, isPlayer = false) {
                this.x = x; this.y = y; this.color = color;
                this.isPlayer = isPlayer;
                this.hp = isPlayer ? 5 : 1;
                this.angle = 0;
                this.lastShot = 0;
                this.path = [];
                this.nextPathUpdate = 0;
                this.hasTripleShot = false;
                this.hasSpeedBoost = false;
                this.currentAIState = "IDLE"; // Để hiển thị Log
            }

            hillClimbMove(targetAngle, speed) {
                let bestAngle = targetAngle;
                const samples = 8;
                for (let i = 0; i < samples; i++) {
                    let testAngle = targetAngle + (Math.PI * 2 / samples) * i;
                    let testX = this.x + Math.cos(testAngle) * speed;
                    let testY = this.y + Math.sin(testAngle) * speed;
                    if (!walls.get(getWallKey(Math.floor(testX / GRID_SIZE), Math.floor(testY / GRID_SIZE)))) {
                        this.move(Math.cos(testAngle) * speed, Math.sin(testAngle) * speed);
                        return; 
                    }
                }
            }

            aiDecisionTree() {
                const distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);
                const speed = 2.5 + (level * 0.2);
                if (distToPlayer < 200 && this.hp === 1) {
                    this.currentAIState = "ESCAPE (HillClimb)";
                    const escapeAngle = Math.atan2(this.y - player.y, this.x - player.x);
                    this.hillClimbMove(escapeAngle, speed);
                } 
                else if (distToPlayer < 500) {
                    this.currentAIState = "ENGAGE (A* + Shoot)";
                    this.angle = Math.atan2(player.y - this.y, player.x - this.x);
                    if (Math.random() < (0.01 + level * 0.005)) this.shoot();
                    this.followPath(speed);
                } 
                else {
                    this.currentAIState = "PATROL (A*)";
                    this.followPath(speed);
                }
            }

            followPath(speed) {
                if (Date.now() > this.nextPathUpdate) {
                    this.path = getPath(this, player);
                    this.nextPathUpdate = Date.now() + 1000;
                }
                if (this.path.length > 1) {
                    let targetNode = this.path[1];
                    let moveAngle = Math.atan2(targetNode.y - this.y, targetNode.x - this.x);
                    this.hillClimbMove(moveAngle, speed);
                }
            }

            update() {
                if (this.isPlayer) {
                    let vx = 0, vy = 0;
                    let currentSpeed = this.hasSpeedBoost ? 9 : 5;
                    if (keys['KeyW']) vy -= currentSpeed; if (keys['KeyS']) vy += currentSpeed;
                    if (keys['KeyA']) vx -= currentSpeed; if (keys['KeyD']) vx += currentSpeed;
                    this.move(vx, vy);
                    this.angle = Math.atan2(mouse.y - (this.y - camera.y), mouse.x - (this.x - camera.x));
                    powerUps.forEach((p, index) => {
                        if (Math.hypot(this.x - p.x, this.y - p.y) < 40) {
                            this.applyPowerUp(p.type);
                            powerUps.splice(index, 1);
                        }
                    });
                } else {
                    this.aiDecisionTree();
                }
            }

            applyPowerUp(type) {
                if (type === 'triple') {
                    this.hasTripleShot = true;
                    document.getElementById('buff-triple').style.display = 'block';
                    setTimeout(() => { 
                        this.hasTripleShot = false; 
                        document.getElementById('buff-triple').style.display = 'none';
                    }, 10000);
                } else if (type === 'hp') {
                    this.hp = Math.min(this.hp + 5, 15);
                    document.getElementById('hp').innerText = this.hp;
                } else if (type === 'speed') {
                    this.hasSpeedBoost = true;
                    document.getElementById('buff-speed').style.display = 'block';
                    setTimeout(() => { 
                        this.hasSpeedBoost = false; 
                        document.getElementById('buff-speed').style.display = 'none';
                    }, 10000);
                }
            }

            move(vx, vy) {
                let nx = this.x + vx;
                let ny = this.y + vy;
                if (!walls.get(getWallKey(Math.floor(nx / GRID_SIZE), Math.floor(ny / GRID_SIZE)))) {
                    this.x = nx; this.y = ny;
                }
            }

            shoot() {
                if (Date.now() - this.lastShot > 300) {
                    if (this.isPlayer && this.hasTripleShot) {
                        bullets.push(new Bullet(this.x, this.y, this.angle, this));
                        bullets.push(new Bullet(this.x, this.y, this.angle + 0.35, this));
                        bullets.push(new Bullet(this.x, this.y, this.angle - 0.35, this));
                    } else {
                        bullets.push(new Bullet(this.x, this.y, this.angle, this));
                    }
                    this.lastShot = Date.now();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x - camera.x, this.y - camera.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                ctx.fillRect(-20, -20, 40, 40);
                ctx.fillStyle = "white";
                ctx.fillRect(15, -4, 20, 8);
                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, angle, owner) {
                this.x = x; this.y = y; this.angle = angle; this.owner = owner;
                this.active = true; this.life = 200;
            }
            update() {
                this.x += Math.cos(this.angle) * 12;
                this.y += Math.sin(this.angle) * 12;
                this.life--;
                if (walls.get(getWallKey(Math.floor(this.x/GRID_SIZE), Math.floor(this.y/GRID_SIZE)))) this.active = false;
                if (this.life <= 0) this.active = false;
            }
            draw() {
                ctx.fillStyle = this.owner.isPlayer ? "#f1c40f" : "#ff4757";
                ctx.beginPath(); ctx.arc(this.x - camera.x, this.y - camera.y, 4, 0, 7); ctx.fill();
            }
        }

        const player = new Tank(0, 0, "#3498db", true);

        function loop() {
            if (!isRunning) return;
            camera.x = player.x - screenW / 2;
            camera.y = player.y - screenH / 2;
            generateWallsAround(player.x, player.y);
            
            if (enemies.length < (4 + level)) {
                let spawnAng = Math.random() * Math.PI * 2;
                enemies.push(new Tank(player.x + Math.cos(spawnAng) * 800, player.y + Math.sin(spawnAng) * 800, "#e67e22"));
            }

            if (Math.random() < 0.005 && powerUps.length < 5) {
                let offX = (Math.random() - 0.5) * 1200;
                let offY = (Math.random() - 0.5) * 1200;
                powerUps.push(new PowerUp(player.x + offX, player.y + offY));
            }

            ctx.fillStyle = "#1b262c";
            ctx.fillRect(0, 0, screenW, screenH);
            
            ctx.strokeStyle = "rgba(50, 130, 184, 0.1)";
            let startX = Math.floor(camera.x / GRID_SIZE) * GRID_SIZE;
            let startY = Math.floor(camera.y / GRID_SIZE) * GRID_SIZE;
            for(let x = startX; x < startX + screenW + GRID_SIZE; x += GRID_SIZE) {
                ctx.beginPath(); ctx.moveTo(x - camera.x, 0); ctx.lineTo(x - camera.x, screenH); ctx.stroke();
            }
            for(let y = startY; y < startY + screenH + GRID_SIZE; y += GRID_SIZE) {
                ctx.beginPath(); ctx.moveTo(0, y - camera.y); ctx.lineTo(screenW, y - camera.y); ctx.stroke();
            }
            walls.forEach((val) => {
                if (val && val.x > camera.x - GRID_SIZE && val.x < camera.x + screenW + GRID_SIZE &&
                    val.y > camera.y - GRID_SIZE && val.y < camera.y + screenH + GRID_SIZE) {
                    ctx.fillStyle = "#0f4c75";
                    ctx.fillRect(val.x - camera.x + 4, val.y - camera.y + 4, GRID_SIZE - 8, GRID_SIZE - 8);
                }
            });
            powerUps.forEach(p => p.draw());
            player.update(); player.draw();

            // LOGIC CẬP NHẬT LOG AI TRÊN GIAO DIỆN
            let logHTML = "";
            enemies.forEach((en, i) => {
                en.update(); en.draw();
                
                // Thu thập log cho 3 con đầu tiên
                if(i < 3) {
                    const d = Math.hypot(player.x - en.x, player.y - en.y).toFixed(0);
                    logHTML += `<div class="log-entry">
                        <b>ENEMY_UNIT_${i+1}</b> [HP:${en.hp}]<br>
                        Distance: ${d}px<br>
                        State: <span style="color:${en.currentAIState.includes('ENGAGE') ? '#ff7675' : '#2ecc71'}">${en.currentAIState}</span><br>
                        Nodes: ${en.path.length}
                    </div>`;
                }

                if (Math.hypot(player.x - en.x, player.y - en.y) < 40) { 
                    isRunning = false; 
                    document.getElementById('gameOver').style.display='flex'; 
                }
            });
            document.getElementById('log-content').innerHTML = logHTML || "No enemies in radar range.";

            bullets = bullets.filter(b => {
                b.update(); b.draw();
                let targets = b.owner === player ? enemies : [player];
                targets.forEach((t, tIdx) => {
                    if (Math.hypot(b.x - t.x, b.y - t.y) < 30) {
                        t.hp--;
                        if (t === player) document.getElementById('hp').innerText = player.hp;
                        if (t.hp <= 0) {
                            if (t === player) { 
                                isRunning = false; 
                                document.getElementById('gameOver').style.display='flex'; 
                            } else { 
                                enemies.splice(tIdx, 1); 
                                score += 10; 
                                document.getElementById('score').innerText = score;
                                checkLevelUp(); 
                            }
                        }
                        b.active = false;
                    }
                });
                return b.active;
            });
            requestAnimationFrame(loop);
        }

        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', () => player.shoot());
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; screenW = canvas.width; screenH = canvas.height; });
        loop();
    </script>
</body>
</html>
