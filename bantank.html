<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tank Battle - Fixed Version</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        button { padding: 15px 30px; margin: 10px; font-size: 20px; cursor: pointer; background: #444; color: white; border: 2px solid #fff; border-radius: 5px; width: 250px; }
        button:hover { background: #666; }
        canvas { background: #000; border: 3px solid #666; display: block; margin: 10px auto; }
        .ui { background: #222; padding: 10px; display: flex; justify-content: center; gap: 60px; font-size: 22px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>TANK BATTLE</h1>
        <button onclick="startGame(false)">Bắt đầu (2 người)</button>
        <button onclick="startGame(true)">Chơi với AI</button>
    </div>

    <div class="ui">
        <div style="color:#ff4d4d">P1: <span id="hp1">3</span> ❤️</div>
        <div style="color:#4d4dff">P2: <span id="hp2">3</span> ❤️</div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const keys = new Map();
        let isGameRunning = false;
        let playWithAI = false;

        // XỬ LÝ PHÍM: Dùng e.code để tránh xung đột
        window.addEventListener('keydown', e => {
            keys.set(e.code, true);
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) e.preventDefault();
        });
        window.addEventListener('keyup', e => keys.set(e.code, false));
        window.addEventListener('blur', () => keys.clear());

        const walls = [{x: 180, y: 120, w: 30, h: 360}, {x: 590, y: 120, w: 30, h: 360}, {x: 340, y: 270, w: 120, h: 60}];

        class Tank {
            constructor(x, y, color, controls) {
                this.x = x; this.y = y; this.color = color;
                this.angle = 0; this.hp = 3; this.controls = controls;
                this.radius = 16; this.lastShot = 0;
            }
            update() {
                let vx = 0, vy = 0;
                if (keys.get(this.controls.up)) vy -= 1;
                if (keys.get(this.controls.down)) vy += 1;
                if (keys.get(this.controls.left)) vx -= 1;
                if (keys.get(this.controls.right)) vx += 1;

                if (vx !== 0 || vy !== 0) {
                    this.angle = Math.atan2(vy, vx);
                    let nx = this.x + vx * 3.5, ny = this.y + vy * 3.5;
                    if (!this.collide(nx, ny)) { this.x = nx; this.y = ny; }
                }

                if (keys.get(this.controls.fire) && Date.now() - this.lastShot > 400) {
                    bullets.push(new Bullet(this.x, this.y, this.angle, this));
                    this.lastShot = Date.now();
                }
            }
            collide(nx, ny) { return walls.some(w => nx+16 > w.x && nx-16 < w.x+w.w && ny+16 > w.y && ny-16 < w.y+w.h); }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.fillStyle = this.color; ctx.fillRect(-16, -12, 32, 24);
                ctx.fillStyle = "#fff"; ctx.fillRect(8, -4, 20, 8);
                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, angle, owner) { this.x=x; this.y=y; this.angle=angle; this.owner=owner; this.active=true; }
            update() {
                this.x += Math.cos(this.angle) * 8; this.y += Math.sin(this.angle) * 8;
                if (this.x<0||this.x>800||this.y<0||this.y>600 || walls.some(w => this.x>w.x && this.x<w.x+w.w && this.y>w.y && this.y<w.y+w.h)) this.active=false;
            }
        }

        // CẤU HÌNH PHÍM MỚI (Sử dụng e.code)
        let p1 = new Tank(80, 300, "#ff4d4d", {up:'KeyW', down:'KeyS', left:'KeyA', right:'KeyD', fire:'Space'});
        let p2 = new Tank(720, 300, "#4d4dff", {up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight', fire:'Enter'});
        let bullets = [];

        function startGame(ai) { playWithAI = ai; isGameRunning = true; document.getElementById('menu').style.display = 'none'; gameLoop(); }

        function gameLoop() {
            if (!isGameRunning) return;
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 800, 600);
            ctx.fillStyle = "#444"; walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
            
            p1.update(); p1.draw();
            if (playWithAI) {
                p2.angle = Math.atan2(p1.y - p2.y, p1.x - p2.x);
                if (Math.random() < 0.02) bullets.push(new Bullet(p2.x, p2.y, p2.angle, p2));
            } else { p2.update(); }
            p2.draw();

            bullets = bullets.filter(b => {
                b.update(); 
                if (b.active) {
                    ctx.fillStyle = 'yellow'; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, 7); ctx.fill();
                    let t = (b.owner === p1) ? p2 : p1;
                    if (Math.hypot(b.x - t.x, b.y - t.y) < 20) {
                        t.hp--; document.getElementById('hp'+(t===p1?1:2)).innerText = t.hp;
                        if (t.hp <= 0) { alert("Winner: " + (b.owner === p1 ? "P1" : "P2")); location.reload(); }
                        return false;
                    }
                }
                return b.active;
            });
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
